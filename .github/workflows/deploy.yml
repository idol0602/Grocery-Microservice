name: Build and Deploy to Oracle VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: grocery-gateway
            dockerfile: Dockerfile.gateway
          - image: grocery-product-service
            dockerfile: Dockerfile.product
          - image: grocery-user-service
            dockerfile: Dockerfile.user
          - image: grocery-order-service
            dockerfile: Dockerfile.order
          - image: grocery-nginx
            dockerfile: nginx/Dockerfile
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_REPOSITORY,GHCR_USERNAME,GHCR_TOKEN,VPS_APP_DIR
          script: |
            set -e
            cd "$VPS_APP_DIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export IMAGE_TAG="$IMAGE_TAG"
            export GITHUB_REPOSITORY="$GITHUB_REPOSITORY"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
